<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوت الاستشارات الصحية</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>بوت الاستشارات الصحية 🩺</h1>
    <div id="chat-container">
        <textarea id="context" placeholder="أدخل النص الطبي أو الأعراض..."></textarea>
        <input id="question" type="text" placeholder="اكتب سؤالك هنا...">
        <button onclick="askQuestion()">أرسل</button>
        <div id="answer"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
